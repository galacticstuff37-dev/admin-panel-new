<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Condensed:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
      :root {
        --page-bg: #221c38;

        --card-bg: rgba(255, 255, 255, 0.03);
        --card-width: 335px;

        --text-primary: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.4);
        --text-logo: rgba(255, 255, 255, 0.6);

        --accent: #3d5ddf;
        --danger: #e83337;

        --border-soft: rgba(255, 255, 255, 0.03);

        --radius-card: 12px;
        --radius-input: 8px;
        --radius-button: 8px;

        --font-family-main: "Sofia Sans Condensed", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;

        --h4-font-size: 24px;
        --h4-line-height: 1.2;

        --label-font-size: 16px;
        --label-line-height: 1.2;

        --value-font-size: 32px;
        --value-line-height: 1.05;

        --input-height: 86px; /* как на скриншоте: 2 строки внутри */
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background-color: var(--page-bg);
        font-family: var(--font-family-main);
      }

      .login-page {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: var(--page-bg);
      }

      .login-frame {
        width: var(--card-width);
        background-color: var(--card-bg);
        border-radius: var(--radius-card);
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .login-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 130px;
        height: 45px;
      }

      .login-logo-img {
        height: 40px;
        width: auto;
        margin-right: 12px;
        display: block;
      }

      .login-logo-title {
        font-weight: 700;
        font-size: 10px;
        line-height: 1.2;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-logo);
      }

      .login-title {
        align-self: flex-start;
        margin: 0;
        font-weight: 700;
        font-size: var(--h4-font-size);
        line-height: var(--h4-line-height);
        text-transform: uppercase;
        color: var(--text-primary);
      }

      .login-form {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .field {
        width: 100%;
      }

      /* Input shell (лейбл + значение внутри) */
      .input-shell {
        height: var(--input-height);
        border-radius: var(--radius-input);
        background-color: var(--card-bg);
        border: 1px solid var(--border-soft);
        padding: 12px 12px;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: background-color 120ms ease, border-color 120ms ease,
          box-shadow 120ms ease;
      }

      /* Hover: opacity 6% */
      .input-shell:hover {
        background-color: rgba(255, 255, 255, 0.06);
      }

      .input-shell:focus-within {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent) inset;
      }

      .input-content {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .input-label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .input-label-text {
        font-weight: 700;
        font-size: var(--label-font-size);
        line-height: var(--label-line-height);
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .input-label-text--password {
        text-transform: none; /* Password как в макете */
      }

      .input-asterisk {
        font-weight: 700;
        font-size: 12px;
        line-height: 1.2;
        text-transform: uppercase;
        color: var(--danger);
      }

      .input-control {
        width: 100%;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text-primary);
        font-family: var(--font-family-main);
        font-weight: 700;
        font-size: var(--value-font-size);
        line-height: var(--value-line-height);
        padding: 0;
        margin: 0;
      }

      .input-control::placeholder {
        color: rgba(255, 255, 255, 0.2);
      }

      .suffix-btn {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        border: none;
        background: rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
        transition: filter 120ms ease, background-color 120ms ease;
        flex: 0 0 auto;
      }

      .suffix-btn:hover {
        filter: brightness(1.08);
      }

      .suffix-btn:active {
        filter: brightness(0.96);
      }

      .suffix-btn--ghost {
        background: transparent;
      }

      .suffix-btn--ghost:hover {
        background: rgba(255, 255, 255, 0.06);
      }

      .suffix-btn img {
        width: 20px;
        height: 20px;
        display: block;
      }

      .suffix-btn svg {
        width: 22px;
        height: 22px;
        display: block;
      }

      .login-button {
        margin-top: 4px;
        width: 100%;
        height: 40px;
        border-radius: var(--radius-button);
        border: none;
        background-color: var(--accent);
        color: var(--text-primary);
        font-family: var(--font-family-main);
        font-weight: 700;
        font-size: 16px;
        line-height: 1.1;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .login-button:hover {
        filter: brightness(1.05);
      }

      .login-button:active {
        filter: brightness(0.97);
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="login-page">
        <div class="login-frame">
          <header class="login-logo">
            <img src="assets/LOGO.svg" alt="Logo" class="login-logo-img" />
            <span class="login-logo-title">ADMIN PANEL</span>
          </header>

          <h1 class="login-title">LOG IN</h1>

          <form class="login-form" @submit.prevent="onSubmit">
            <!-- EMAIL -->
            <div class="field">
              <div class="input-shell">
                <div class="input-content">
                  <div class="input-label">
                    <span class="input-label-text">EMAIL</span>
                    <span class="input-asterisk">*</span>
                  </div>

                  <input
                    v-model="email"
                    type="email"
                    class="input-control"
                    autocomplete="username"
                    spellcheck="false"
                    required
                  />
                </div>

                <!-- Clear (X) как в макете -->
                <button
                  v-if="email"
                  type="button"
                  class="suffix-btn"
                  @click="clearEmail"
                  aria-label="Clear email"
                  title="Clear"
                >
                  <svg
                    viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg"
                    aria-hidden="true"
                  >
                    <path
                      d="M6.5 6.5l11 11M17.5 6.5l-11 11"
                      stroke="white"
                      stroke-opacity="0.95"
                      stroke-width="2"
                      stroke-linecap="round"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <!-- PASSWORD -->
            <div class="field">
              <div class="input-shell">
                <div class="input-content">
                  <div class="input-label">
                    <span class="input-label-text input-label-text--password"
                      >Password</span
                    >
                    <span class="input-asterisk">*</span>
                  </div>

                  <input
                    v-model="password"
                    :type="showPassword ? 'text' : 'password'"
                    class="input-control"
                    autocomplete="current-password"
                    required
                  />
                </div>

                <button
                  type="button"
                  class="suffix-btn suffix-btn--ghost"
                  @click="togglePassword"
                  :aria-label="showPassword ? 'Hide password' : 'Show password'"
                  :title="showPassword ? 'Hide password' : 'Show password'"
                >
                  <img
                    v-if="!showPassword"
                    src="assets/eye-close.svg"
                    alt="hide password"
                  />
                  <img
                    v-else
                    src="assets/eye-open.svg"
                    alt="show password"
                  />
                </button>
              </div>
            </div>

            <button type="submit" class="login-button">Login</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const email = ref("");
          const password = ref("");
          const showPassword = ref(false);

          const togglePassword = () => {
            showPassword.value = !showPassword.value;
          };

          const clearEmail = () => {
            email.value = "";
          };

          const onSubmit = () => {
            console.log("login", {
              email: email.value,
              password: password.value,
            });
          };

          return {
            email,
            password,
            showPassword,
            togglePassword,
            clearEmail,
            onSubmit,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
