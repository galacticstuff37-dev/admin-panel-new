<!DOCTYPE html>

<body class="h-full bg-page">

</div>

<!-- Interactivity scripts -->
<script>
  function setupOutsideClick(trigger, menu) {
    document.addEventListener('click', (e) => {
      if (!trigger || !menu) return;
      if (trigger.contains(e.target)) return;
      if (!menu.contains(e.target)) {
        menu.classList.add('hidden');
      }
    });
  }

  // ALL CASINOS dropdown
  const casinosToggle = document.getElementById('all-casinos-toggle');
  const casinosMenu = document.getElementById('all-casinos-menu');
  if (casinosToggle && casinosMenu) {
    casinosToggle.addEventListener('click', () => {
      casinosMenu.classList.toggle('hidden');
    });
    setupOutsideClick(casinosToggle, casinosMenu);
  }

  // Period tabs
  const periodTabs = document.querySelectorAll('.period-tab');
  periodTabs.forEach((btn) => {
    btn.addEventListener('click', () => {
      periodTabs.forEach((b) => {
        b.classList.remove('bg-primarySoft', 'border-primary', 'text-textMain');
        b.classList.add('bg-surface', 'border-borderSoft', 'text-textMuted');
      });
      btn.classList.add('bg-primarySoft', 'border-primary', 'text-textMain');
      btn.classList.remove('bg-surface', 'border-borderSoft', 'text-textMuted');
    });
  });

  // BY NAME dropdown
  const sortToggle = document.getElementById('sort-toggle');
  const sortMenu = document.getElementById('sort-menu');
  const sortLabel = document.getElementById('sort-label');
  if (sortToggle && sortMenu && sortLabel) {
    sortToggle.addEventListener('click', () => {
      sortMenu.classList.toggle('hidden');
    });
    sortMenu.querySelectorAll('[data-sort-option]').forEach((btn) => {
      btn.addEventListener('click', () => {
        sortLabel.textContent = btn.dataset.sortOption;
        sortMenu.classList.add('hidden');
      });
    });
    setupOutsideClick(sortToggle, sortMenu);
  }

  // Simple visual toggles for filter buttons
  function attachToggle(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('click', () => {
      el.classList.toggle('border-primary');
      el.classList.toggle('bg-primarySoft');
    });
  }
  attachToggle('filter-type-toggle');
  attachToggle('filter-currency-toggle');
</script>
</body>
</html>
