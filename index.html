<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Sofia+Sans+Condensed:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
      :root {
        --page-bg: #221c38;

        --card-bg: rgba(255, 255, 255, 0.03);
        --card-width: 335px;

        --text-primary: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.4);

        --accent: #3d5ddf;
        --danger: #e83337;

        --border-soft: rgba(255, 255, 255, 0.03);

        --radius-card: 12px;
        --radius-input: 1px; /* как просил: 1px */
        --radius-button: 8px;

        --font-family-main: "Sofia Sans Condensed", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;

        --h4-font-size: 24px;
        --h4-line-height: 1.2;

        --input-height: 48px;

        --value-size-default: 16px;
        --value-size-focus: 12px; /* текст при фокусе 12px */
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background-color: var(--page-bg);
        font-family: var(--font-family-main);
      }

      .login-page {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: var(--page-bg);
      }

      .login-frame {
        width: var(--card-width);
        background-color: var(--card-bg);
        border-radius: var(--radius-card);
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .login-logo {
        width: 130px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-logo img {
        width: 130px;
        height: 45px;
        object-fit: contain;
        display: block;
      }

      .login-title {
        align-self: flex-start;
        margin: 0;
        font-weight: 700;
        font-size: var(--h4-font-size);
        line-height: var(--h4-line-height);
        text-transform: uppercase;
        color: var(--text-primary);
      }

      .login-form {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* ===== Inputs (Main / L (48) + Password / L (48)) ===== */
      .input-shell {
        position: relative;
        height: var(--input-height);
        border-radius: var(--radius-input);
        background-color: var(--card-bg);
        border: 1px solid var(--border-soft);
        padding: 0 12px;
        display: flex;
        align-items: center;
        transition: background-color 120ms ease, border-color 120ms ease,
          box-shadow 120ms ease;
      }

      /* hover 6% */
      .input-shell:hover {
        background-color: rgba(255, 255, 255, 0.06);
      }

      /* focus-бордер как в макете */
      .input-shell:focus-within {
        background-color: var(--card-bg);
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent) inset;
      }

      /* плавающий лейбл:
         центр по вертикали, поднимается вверх при фокусе / значении */
      .input-label {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        pointer-events: none;
        transition: top 120ms ease, transform 120ms ease;
      }

      .input-shell.is-active .input-label {
        top: 8px;
        transform: translateY(0);
      }

      .input-label-text {
        font-weight: 700;
        font-size: 16px;
        line-height: 1.2;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .input-asterisk {
        font-weight: 700;
        font-size: 12px;
        line-height: 1.2;
        text-transform: uppercase;
        color: var(--danger);
      }

      .input-control {
        width: 100%;
        height: 100%;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text-primary);
        font-family: var(--font-family-main);
        font-weight: 700;
        font-size: var(--value-size-default);
        line-height: 1.2;
        padding: 18px 40px 8px 0;
        transition: font-size 120ms ease;
      }

      /* текст при фокусе = 12px */
      .input-shell.is-focused .input-control {
        font-size: var(--value-size-focus);
      }

      .suffix {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .clear-btn {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
      }

      .clear-btn svg {
        width: 20px;
        height: 20px;
        display: block;
      }

      /* eye без подложки, hover только на иконке */
      .icon-btn {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 10px;
        background: transparent;
        padding: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-img {
        width: 20px;
        height: 20px;
        display: block;
        opacity: 0.8; /* 80% */
        transition: opacity 120ms ease;
      }

      .icon-btn:hover .icon-img {
        opacity: 1; /* hover 100% */
      }

      .login-button {
        margin-top: 4px;
        width: 100%;
        height: 40px;
        border-radius: var(--radius-button);
        border: none;
        background-color: var(--accent);
        color: var(--text-primary);
        font-family: var(--font-family-main);
        font-weight: 700;
        font-size: 16px;
        line-height: 1.1;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .login-button:hover {
        filter: brightness(1.05);
      }

      .login-button:active {
        filter: brightness(0.97);
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div class="login-page">
        <div class="login-frame">
          <header class="login-logo">
            <img src="assets/LOGO.svg" alt="Logo" />
          </header>

          <h1 class="login-title">LOG IN</h1>

          <form class="login-form" @submit.prevent="onSubmit">
            <!-- EMAIL -->
            <div
              class="input-shell"
              :class="{
                'is-active': emailFocused || email.length > 0,
                'is-focused': emailFocused
              }"
            >
              <div class="input-label">
                <span class="input-label-text">EMAIL</span>
                <span class="input-asterisk">*</span>
              </div>

              <input
                v-model="email"
                class="input-control"
                type="email"
                autocomplete="username"
                spellcheck="false"
                required
                @focus="emailFocused = true"
                @blur="emailFocused = false"
              />

              <div class="suffix" v-if="email.length > 0">
                <button
                  type="button"
                  class="clear-btn"
                  aria-label="Clear email"
                  title="Clear"
                  @click="clearEmail"
                >
                  <svg
                    viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg"
                    aria-hidden="true"
                  >
                    <path
                      d="M6.5 6.5l11 11M17.5 6.5l-11 11"
                      stroke="white"
                      stroke-opacity="0.95"
                      stroke-width="2"
                      stroke-linecap="round"
                    />
                  </svg>
                </button>
              </div>
            </div>

            <!-- PASSWORD -->
            <div
              class="input-shell"
              :class="{
                'is-active': passwordFocused || password.length > 0,
                'is-focused': passwordFocused
              }"
            >
              <div class="input-label">
                <span class="input-label-text">PASSWORD</span>
                <span class="input-asterisk">*</span>
              </div>

              <input
                v-model="password"
                class="input-control"
                :type="showPassword ? 'text' : 'password'"
                autocomplete="current-password"
                required
                @focus="passwordFocused = true"
                @blur="passwordFocused = false"
              />

              <div class="suffix">
                <button
                  type="button"
                  class="icon-btn"
                  @click="togglePassword"
                  :aria-label="showPassword ? 'Hide password' : 'Show password'"
                  :title="showPassword ? 'Hide password' : 'Show password'"
                >
                  <img
                    v-if="!showPassword"
                    src="assets/eye-close.svg"
                    alt="hide password"
                    class="icon-img"
                  />
                  <img
                    v-else
                    src="assets/eye-open.svg"
                    alt="show password"
                    class="icon-img"
                  />
                </button>
              </div>
            </div>

            <button type="submit" class="login-button">Login</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const email = ref("");
          const password = ref("");
          const showPassword = ref(false);

          const emailFocused = ref(false);
          const passwordFocused = ref(false);

          const togglePassword = () => {
            showPassword.value = !showPassword.value;
          };

          const clearEmail = () => {
            email.value = "";
          };

          const onSubmit = () => {
            console.log("login", {
              email: email.value,
              password: password.value,
            });
          };

          return {
            email,
            password,
            showPassword,
            emailFocused,
            passwordFocused,
            togglePassword,
            clearEmail,
            onSubmit,
          };
        },
      }).mount("#app");
    </script>
  </body>
</html>
